spring.application.name=certitracker-backend
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mydb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:sat@789S}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT configuration
app.jwt.secret=${APP_JWT_SECRET:0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# OCR configuration
app.ocr.language=${APP_OCR_LANGUAGE:eng}
app.ocr.tessdata-path=${APP_OCR_TESSDATA_PATH:}

# Include error messages in JSON error responses for client-side display
server.error.include-message=always
